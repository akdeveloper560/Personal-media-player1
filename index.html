<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonBeat - Pure Online Streamer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-bolt neon-text"></i> <span>NeonBeat</span>
            </div>
           <nav class="menu">
    <p class="menu-title">Discover</p>
    <ul>
        <li class="active" id="btn-online-search"><i class="fa-solid fa-earth-americas"></i> Online Search</li>
    </ul>
    <p class="menu-title" style="margin-top: 20px;">Your Playlists</p>
    <ul id="playlistList">
        </ul>
</nav>
            <audio id="main-audio-engine" preload="auto"></audio>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Type song name and press search...">
                    <button id="searchBtn" class="btn-search">Search</button>
                </div>
            </header>

            <div class="content-body">
                <h2 id="sectionTitle" class="section-title">Search Anything Online</h2>
                <div id="songsGrid" class="songs-grid"></div>
            </div>
        </main>
    </div>

    <footer class="player-bar">
        <div class="player-song-info">
            <div class="static-thumbnail-box">
                <img id="playerThumbnail" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=50" alt="Thumbnail">
            </div>
            <div class="song-text">
                <h4 id="playerTitle">No Track Loaded</h4>
                <p id="playerArtist">-</p>
            </div>
        </div>

        <div class="player-controls-wrapper">
            <div class="control-buttons">
                <button id="playPauseBtn" class="ctrl-btn play-main"><i class="fa-solid fa-play"></i></button>
            </div>
            <div class="progress-container">
                <span id="currentTime" class="time-stamp">0:00</span>
                <input type="range" id="progressBar" class="slider" min="0" max="100" value="0">
                <span id="totalTime" class="time-stamp">0:00</span>
            </div>
        </div>

        <div class="player-right-controls">
            <div class="volume-wrapper">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volumeBar" class="slider" min="0" max="100" value="80">
            </div>
        </div>
    </footer>
    <div id="customDropdown" class="custom-dropdown">
    <div class="dropdown-header">Playlist Options</div>
    <ul id="dropdownOptions">
        </ul>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Create Playlist</h3>
            <button id="closeModalBtn" class="close-modal-btn">&times;</button>
        </div>
        <div class="modal-body">
            <input type="text" id="playlistInput" placeholder="Enter playlist name...">
            <button id="savePlaylistBtn" class="btn-save">Create</button>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
